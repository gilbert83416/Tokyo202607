<style>
  :root{
    --bg: #f5f3ee;
    --card: #ffffff;
    --ink: #2b2b2b;
    --sub: #6b6b6b;
    --accent: #d1495b;
    --accent2: #2e6f95;
    --line: #e6e1d8;
    --shadow: 0 2px 10px rgba(0,0,0,0.06);
    --radius: 16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Hiragino Sans", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 40px;
  }
  header{
    background: linear-gradient(135deg, #2e6f95, #1a4a63);
    color: #fff;
    padding: 28px 20px 22px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow);
  }
  header h1{
    margin:0 0 6px;
    font-size: 1.35rem;
    letter-spacing: 0.5px;
  }
  header .flights{
    font-size: 0.8rem;
    opacity: 0.9;
    line-height: 1.6;
  }
  .hotel-card{
    max-width: 720px;
    margin: 16px auto 0;
    padding: 0 16px;
  }
  .hotel-box{
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 18px;
    font-size: 0.85rem;
    color: var(--sub);
  }
  .hotel-box strong{
    color: var(--ink);
    font-size: 0.95rem;
  }
  .hotel-box .stations{
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .station-pill{
    background: #eef4f7;
    color: var(--accent2);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    white-space: nowrap;
  }

  nav.tabs{
    max-width: 720px;
    margin: 20px auto 0;
    padding: 0 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex: 0 0 auto;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--sub);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.8rem;
    cursor: pointer;
    text-align: center;
    line-height: 1.4;
    transition: all 0.15s ease;
  }
  .tab-btn .d{ font-weight:700; font-size:0.85rem; display:block; color: var(--ink);}
  .tab-btn.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tab-btn.active .d{ color:#fff; }

  main{
    max-width: 720px;
    margin: 18px auto;
    padding: 0 16px;
  }
  .day-panel{ display:none; }
  .day-panel.active{ display:block; animation: fadein 0.25s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  .day-header{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom: 14px;
  }
  .day-header .date-big{
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
  }
  .day-header .title{
    font-size: 1.1rem;
    font-weight: 700;
  }
  .day-header .weekday{
    font-size: 0.8rem;
    color: var(--sub);
    background: var(--line);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .section{
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .section h3{
    margin: 0 0 10px;
    font-size: 0.9rem;
    color: var(--accent2);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .schedule-item{
    display: flex;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 0.88rem;
  }
  .schedule-item:last-child{ border-bottom:none; }
  .schedule-item .time{
    flex: 0 0 56px;
    font-weight: 700;
    color: var(--accent);
    font-size: 0.85rem;
  }
  .schedule-item .activity{ flex:1; }
  .badge{
    display:inline-block;
    font-size: 0.68rem;
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge.transport{ background:#e8f0f5; color:var(--accent2); }
  .badge.shopping{ background:#fdeef0; color:var(--accent); }

  .transport-line{
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--ink);
  }
  .note-line{
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--sub);
    background: #faf6ea;
    border-left: 3px solid #d9b45a;
    padding: 8px 10px;
    border-radius: 6px;
  }

  .restaurant-list, .shop-list{
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
  }
  .restaurant-list li{
    display:flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #faf9f6;
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .restaurant-list li .r-name{ font-weight:700; }
  .restaurant-list li .r-note{ color: var(--sub); font-size:0.78rem; }
  .restaurant-list li .r-type{
    flex:0 0 auto;
    font-size:0.72rem;
    color:#fff;
    background: var(--accent2);
    padding: 2px 8px;
    border-radius: 8px;
  }

  .shop-list li a{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 10px 12px;
    background: #faf9f6;
    border-radius: 10px;
    text-decoration:none;
    color: var(--ink);
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.15s;
  }
  .shop-list li a:hover{ background:#f0eee7; }
  .shop-list li a::after{
    content: "📍";
    font-size: 0.9rem;
  }
  .order-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    margin-right: 6px;
    vertical-align: middle;
  }

  .empty-hint{
    color: var(--sub);
    font-size: 0.82rem;
    font-style: italic;
  }

  .checklist{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .checklist input{
    width:16px; height:16px;
  }
  .schedule-item.done .activity, .schedule-item.done .time{
    text-decoration: line-through;
    opacity: 0.5;
  }

  footer{
    text-align:center;
    color: var(--sub);
    font-size: 0.75rem;
    margin-top: 30px;
    padding: 0 20px;
  }
</style>

  return `${parseInt(m)}/${parseInt(d)}`;
}

  回程：${f.return.date} ${f.return.flight} ${f.return.route} ${f.return.depart}→${f.return.arrive}
`;

const h = trip.hotel;
document.getElementById("hotel-box").innerHTML = `
  <strong>🏨 <a href="${h.map}" target="_blank" rel="noopener" style="color:inherit;">${h.name}</a></strong><br>
  ${h.address}
  <div class="stations">
    ${h.nearestStations.map(s => `<span class="station-pill">${s.line} ${s.station} 步行${s.walk}</span>`).join("")}
  </div>
`;

const tabsEl = document.getElementById("tabs");
const mainEl = document.getElementById("main");

trip.days.forEach((day, idx) => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (idx === 0 ? " active" : "");
  btn.innerHTML = `<span class="d">${monthDay(day.date)}</span>${day.weekday}`;
  btn.onclick = () => selectDay(idx);
  tabsEl.appendChild(btn);

  const panel = document.createElement("div");
  panel.className = "day-panel" + (idx === 0 ? " active" : "");
  panel.id = `panel-${idx}`;

  let html = `
    <div class="day-header">
      <span class="date-big">${monthDay(day.date)}</span>
      <span class="title">${day.title}</span>
      <span class="weekday">週${day.weekday}</span>
    </div>
  `;

  if (day.schedule && day.schedule.length) {
    html += `<div class="section"><h3>📋 行程時間表</h3>`;
    day.schedule.forEach((item, i) => {
      const badge = item.type ? `<span class="badge ${item.type}">${item.type === 'transport' ? '交通' : '購物'}</span>` : "";
      html += `
        <div class="schedule-item" data-key="d${idx}-s${i}">
          <label class="checklist" style="flex:0 0 20px;">
            <input type="checkbox" onchange="toggleDone(this, 'd${idx}-s${i}')">
          </label>
          <span class="time">${item.time || ""}</span>
          <span class="activity">${item.activity}${badge}</span>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (day.transport) {
    html += `
      <div class="section">
        <h3>🚃 交通路線</h3>
        <div class="transport-line">${day.transport}</div>
        ${day.note ? `<div class="note-line">⚠️ ${day.note}</div>` : ""}
      </div>
    `;
  } else if (day.note) {
    html += `<div class="section"><div class="note-line">⚠️ ${day.note}</div></div>`;
  }

  if (day.venue) {
    html += `
      <div class="section">
        <h3>🏬 景點資訊</h3>
        <div class="transport-line"><strong>${day.venue.name}</strong><br>${day.venue.address}</div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <a href="${day.venue.map || mapUrl(day.venue.name + ' ' + day.venue.address)}" target="_blank" rel="noopener" style="flex:1;text-align:center;background:var(--accent2);color:#fff;padding:8px;border-radius:8px;text-decoration:none;font-size:0.82rem;">📍 Google地圖</a>
          <a href="${day.venue.website}" target="_blank" rel="noopener" style="flex:1;text-align:center;background:var(--accent);color:#fff;padding:8px;border-radius:8px;text-decoration:none;font-size:0.82rem;">🌐 官方網站</a>
        </div>
      </div>
    `;
  }

  if (day.attractions && day.attractions.length) {
    html += `<div class="section"><h3>🎡 景點</h3><ul class="restaurant-list">`;
    day.attractions.forEach(a => {
      html += `
        <li>
          <a href="${a.map || mapUrl(a.name)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:flex;justify-content:space-between;width:100%;align-items:center;gap:10px;">
            <span>
              <span class="r-name">${a.name}</span><br>
              <span class="r-note">${a.note || ""}</span>
            </span>
            <span class="r-type">${a.type}</span>
          </a>
        </li>
      `;
    });
    html += `</ul></div>`;
  }

  html += `<div class="section"><h3>🍜 推薦餐廳</h3>`;
  if (day.restaurants && day.restaurants.length) {
    html += `<ul class="restaurant-list">`;
    day.restaurants.forEach(r => {
      html += `
        <li>
          <a href="${r.map || mapUrl(r.name)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:flex;justify-content:space-between;width:100%;align-items:center;gap:10px;">
            <span>
              <span class="r-name">${r.name}</span><br>
              <span class="r-note">${r.note || ""}</span>
            </span>
            <span class="r-type">${r.type}</span>
          </a>
        </li>
      `;
    });
    html += `</ul>`;
  } else {
    html += `<div class="empty-hint">此日尚無指定餐廳，可自由探索</div>`;
  }
  html += `</div>`;

  if (day.shops && day.shops.length) {
    const hasCoords = day.shops.some(s => s.lat && s.lng);
    html += `<div class="section"><h3>🃏 卡牌店清單${hasCoords ? '（依建議走訪順序）' : ''}</h3><ul class="shop-list">`;
    day.shops.forEach((s, i) => {
      html += `
        <li>
          <a href="${s.map}" target="_blank" rel="noopener" style="align-items:flex-start;">
            <span><span class="order-badge">${i + 1}</span>${s.name}${s.note ? `<br><span class="r-note" style="margin-left:26px;">${s.note}</span>` : ""}</span>
          </a>
        </li>
      `;
    });
    html += `</ul>`;
    if (hasCoords) {
      html += `
        <div id="shopmap-${idx}" style="height:340px;border-radius:12px;margin-top:12px;"></div>
        <div class="note-line" style="margin-top:8px;">🗺️ 圓圈數字為建議走訪順序，虛線為參考路徑；地圖資料來源 OpenStreetMap，實際依開店時間彈性調整</div>
      `;
    }
    html += `</div>`;
  }

  panel.innerHTML = html;
  mainEl.appendChild(panel);
});

const dayMaps = {};
function initShopMap(idx, day){
  const shops = (day.shops || []).filter(s => s.lat && s.lng);
  if (!shops.length || dayMaps[idx]) return;
  const el = document.getElementById(`shopmap-${idx}`);
  if (!el) return;
  const map = L.map(el).setView([shops[0].lat, shops[0].lng], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  const latlngs = [];
  shops.forEach((s, i) => {
    const icon = L.divIcon({
      className: 'shop-marker',
      html: `<div style="background:#d1495b;color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4);">${i + 1}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });
    L.marker([s.lat, s.lng], { icon }).addTo(map)
      .bindPopup(`<strong>${i + 1}. ${s.name}</strong><br>${s.note || ""}<br><a href="${s.map}" target="_blank" rel="noopener">在Google地圖開啟</a>`);
    latlngs.push([s.lat, s.lng]);
  });
  L.polyline(latlngs, { color: '#2e6f95', weight: 3, dashArray: '6 6' }).addTo(map);
  map.fitBounds(latlngs, { padding: [30, 30] });
  dayMaps[idx] = map;
}
trip.days.forEach((day, idx) => {
  if (idx === 0) initShopMap(idx, day);
});

const subwayIdx = trip.days.length;
const subwayBtn = document.createElement("button");
subwayBtn.className = "tab-btn";
subwayBtn.innerHTML = `<span class="d">🚇</span>地鐵圖`;
subwayBtn.onclick = () => selectDay(subwayIdx);
tabsEl.appendChild(subwayBtn);

const subwayPanel = document.createElement("div");
subwayPanel.className = "day-panel";
subwayPanel.id = `panel-${subwayIdx}`;
subwayPanel.innerHTML = `
  <div class="day-header">
    <span class="title">🚇 東京地鐵路線圖</span>
  </div>
  <div class="section">
    <img src="${trip.subwayMap.image}" alt="東京地鐵路線圖" style="width:100%; height:auto; border-radius:8px; background:#fff;">
    <div class="note-line" style="margin-top:12px;">
      建議先截圖存到手機相簿，離線也能查看。
    </div>
  </div>
`;
mainEl.appendChild(subwayPanel);

function selectDay(idx){
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  document.querySelectorAll(".day-panel").forEach((p, i) => p.classList.toggle("active", i === idx));
  const day = trip.days[idx];
  if (day && day.shops && day.shops.some(s => s.lat && s.lng)) {
    setTimeout(() => {
      if (!dayMaps[idx]) initShopMap(idx, day);
      else dayMaps[idx].invalidateSize();
    }, 50);
  }
}

function toggleDone(checkbox, key){
  const item = checkbox.closest(".schedule-item");
  item.classList.toggle("done", checkbox.checked);
  const state = JSON.parse(localStorage.getItem("tokyo-trip-checks") || "{}");
  state[key] = checkbox.checked;
  localStorage.setItem("tokyo-trip-checks", JSON.stringify(state));
}

// restore checked state
(function restore(){
  const state = JSON.parse(localStorage.getItem("tokyo-trip-checks") || "{}");
  Object.keys(state).forEach(key => {
    if (!state[key]) return;
    const item = document.querySelector(`[data-key="${key}"]`);
    if (item) {
      item.classList.add("done");
      const cb = item.querySelector("input[type=checkbox]");
      if (cb) cb.checked = true;
    }
  });
})();
</script>
